version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17

  pre_build:
    commands:
      - echo "Starting backend build..."
      - java -version
      - mvn -version

  build:
    commands:
      - echo "Building Spring Boot application..."
      - mvn clean package -DskipTests

  post_build:
    commands:
      - echo "Backend build completed successfully."

artifacts:
  files:
    - target/StayNest-0.0.1-SNAPSHOT.jar
  name: staynest-backend-$(date +%Y%m%d%H%M%S)

cache:
  paths:
    - /root/.m2/**/*
