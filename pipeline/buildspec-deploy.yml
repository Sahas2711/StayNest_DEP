version: 0.2

phases:
  pre_build:
    commands:
      - echo "=== Resolving EC2 instance IDs from ASG $ASG_NAME ==="
      - INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups --auto-scaling-group-names "$ASG_NAME" --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId" --output text)
      - test -n "$INSTANCE_IDS" || (echo "ERROR: No InService instances in ASG $ASG_NAME"; exit 1)
      - echo "Target instances: $INSTANCE_IDS"

  build:
    commands:
      - echo "=== Uploading JAR to S3 ==="
      - aws s3 cp $CODEBUILD_SRC_DIR_BackendArtifact/target/StayNest-0.0.1-SNAPSHOT.jar s3://${ARTIFACT_BUCKET}/releases/StayNest-0.0.1-SNAPSHOT.jar
      - echo "=== Creating deploy script ==="
      - echo '#!/bin/bash' > /tmp/deploy.sh
      - echo 'set -e' >> /tmp/deploy.sh
      - echo 'systemctl stop staynest || true' >> /tmp/deploy.sh
      - echo "aws s3 cp s3://${ARTIFACT_BUCKET}/releases/StayNest-0.0.1-SNAPSHOT.jar /opt/staynest/StayNest-0.0.1-SNAPSHOT.jar" >> /tmp/deploy.sh
      - echo 'chown ec2-user:ec2-user /opt/staynest/StayNest-0.0.1-SNAPSHOT.jar' >> /tmp/deploy.sh
      - echo 'chmod 500 /opt/staynest/StayNest-0.0.1-SNAPSHOT.jar' >> /tmp/deploy.sh
      - echo 'systemctl enable staynest' >> /tmp/deploy.sh
      - echo 'systemctl start staynest' >> /tmp/deploy.sh
      - echo 'sleep 30' >> /tmp/deploy.sh
      - echo 'for i in 1 2 3 4 5 6; do HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health || echo 000); echo "Health check $i: $HTTP"; if [ "$HTTP" = "200" ]; then echo "Deploy successful"; exit 0; fi; sleep 15; done' >> /tmp/deploy.sh
      - echo 'echo "Health check failed"' >> /tmp/deploy.sh
      - echo 'journalctl -u staynest --no-pager -n 50' >> /tmp/deploy.sh
      - echo 'exit 1' >> /tmp/deploy.sh
      - cat /tmp/deploy.sh
      - echo "=== Sending SSM deploy command ==="
      - INSTANCE_LIST=$(echo $INSTANCE_IDS | tr ' ' ',')
      - COMMAND_ID=$(aws ssm send-command --document-name "AWS-RunShellScript" --targets "Key=instanceids,Values=$INSTANCE_LIST" --parameters '{"commands":["bash -s"]}' --cli-binary-format raw-in-base64-out --payload "$(cat /tmp/deploy.sh | base64)" --comment "StayNest deploy" --timeout-seconds 300 --query "Command.CommandId" --output text)
      - echo "SSM Command ID: $COMMAND_ID"

  post_build:
    commands:
      - echo "=== Polling SSM command status ==="
      - INSTANCE_LIST=$(echo $INSTANCE_IDS | tr ' ' ',')
      - for INSTANCE_ID in $INSTANCE_IDS; do echo "Checking $INSTANCE_ID"; for i in $(seq 1 30); do STATUS=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text 2>/dev/null || echo "Pending"); echo "  [$i/30] $STATUS"; if [ "$STATUS" = "Success" ]; then echo "OK: $INSTANCE_ID"; break; elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text; exit 1; fi; sleep 10; done; done
      - echo "=== Deploy complete ==="
