version: 0.2

phases:
  pre_build:
    commands:
      - echo "=== Resolving EC2 instance IDs from ASG $ASG_NAME ==="
      - INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups --auto-scaling-group-names "$ASG_NAME" --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId" --output text)
      - if [ -z "$INSTANCE_IDS" ]; then echo "ERROR: No InService instances in ASG $ASG_NAME"; exit 1; fi
      - echo "Target instances: $INSTANCE_IDS"

  build:
    commands:
      - echo "=== Uploading JAR to S3 ==="
      - aws s3 cp $CODEBUILD_SRC_DIR_BackendArtifact/target/StayNest-0.0.1-SNAPSHOT.jar s3://${ARTIFACT_BUCKET}/releases/StayNest-0.0.1-SNAPSHOT.jar
      - echo "=== Sending SSM deploy command ==="
      - COMMAND_ID=$(aws ssm send-command --document-name "AWS-RunShellScript" --targets "Key=instanceids,Values=$(echo $INSTANCE_IDS | tr ' ' ',')" --parameters commands=["set -e","systemctl stop staynest || true","aws s3 cp s3://${ARTIFACT_BUCKET}/releases/StayNest-0.0.1-SNAPSHOT.jar /opt/staynest/StayNest-0.0.1-SNAPSHOT.jar","chown ec2-user:ec2-user /opt/staynest/StayNest-0.0.1-SNAPSHOT.jar","chmod 500 /opt/staynest/StayNest-0.0.1-SNAPSHOT.jar","systemctl enable staynest","systemctl start staynest","sleep 30","for i in 1 2 3 4 5 6; do HTTP=\$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/health || echo 000); echo \"Health \$i: \$HTTP\"; if [ \"\$HTTP\" = \"200\" ]; then echo Deploy OK; exit 0; fi; sleep 15; done","echo Health check failed; journalctl -u staynest --no-pager -n 50; exit 1"] --comment "StayNest deploy" --timeout-seconds 300 --query "Command.CommandId" --output text)
      - echo "SSM Command ID: $COMMAND_ID"

  post_build:
    commands:
      - echo "=== Polling SSM command status ==="
      - |
        for INSTANCE_ID in $INSTANCE_IDS; do
          echo "Checking $INSTANCE_ID"
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "  [$i/30] $STATUS"
            if [ "$STATUS" = "Success" ]; then echo "OK: $INSTANCE_ID"; break; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 10
          done
        done
      - echo "=== Deploy complete ==="
