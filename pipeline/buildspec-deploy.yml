version: 0.2
# Backend deploy via SSM SendCommand — no CodeDeploy required.
# Flow:
#   1. Upload JAR from pipeline artifact to S3 artifact bucket
#   2. SSM SendCommand on all running EC2 instances in the ASG
#      → pull JAR from S3, restart systemd service, validate /health

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - pip install --quiet awscli --upgrade

  pre_build:
    commands:
      - echo "=== Resolving EC2 instance IDs from ASG: $ASG_NAME ==="
      - |
        INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
          --auto-scaling-group-names "$ASG_NAME" \
          --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId" \
          --output text)
      - |
        if [ -z "$INSTANCE_IDS" ]; then
          echo "ERROR: No InService instances found in ASG $ASG_NAME"
          exit 1
        fi
      - echo "Target instances: $INSTANCE_IDS"

  build:
    commands:
      - echo "=== Uploading JAR to S3 ==="
      - |
        aws s3 cp target/StayNest-0.0.1-SNAPSHOT.jar \
          s3://${ARTIFACT_BUCKET}/releases/StayNest-0.0.1-SNAPSHOT.jar
      - echo "=== Sending SSM deploy command to instances ==="
      - |
        COMMAND_ID=$(aws ssm send-command \
          --document-name "AWS-RunShellScript" \
          --targets "Key=instanceids,Values=$(echo $INSTANCE_IDS | tr ' ' ',')" \
          --parameters 'commands=[
            "set -e",
            "echo \"Stopping staynest service...\"",
            "systemctl stop staynest || true",
            "echo \"Pulling new JAR from S3...\"",
            "aws s3 cp s3://'"${ARTIFACT_BUCKET}"'/releases/StayNest-0.0.1-SNAPSHOT.jar /opt/staynest/StayNest-0.0.1-SNAPSHOT.jar",
            "chown ec2-user:ec2-user /opt/staynest/StayNest-0.0.1-SNAPSHOT.jar",
            "chmod 500 /opt/staynest/StayNest-0.0.1-SNAPSHOT.jar",
            "echo \"Starting staynest service...\"",
            "systemctl start staynest",
            "echo \"Waiting for health check...\"",
            "sleep 20",
            "HTTP=$(curl -s -o /dev/null -w \"%{http_code}\" http://localhost:8080/health || echo 000)",
            "if [ \"$HTTP\" != \"200\" ]; then echo \"Health check failed: $HTTP\"; journalctl -u staynest --no-pager -n 50; exit 1; fi",
            "echo \"Deploy successful on $(hostname)\""
          ]' \
          --comment "StayNest deploy $(date +%Y%m%d%H%M%S)" \
          --timeout-seconds 180 \
          --query "Command.CommandId" \
          --output text)
      - echo "SSM Command ID: $COMMAND_ID"

  post_build:
    commands:
      - echo "=== Waiting for SSM command to complete on all instances ==="
      - |
        for INSTANCE_ID in $INSTANCE_IDS; do
          echo "Checking instance: $INSTANCE_ID"
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "  [$i/30] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "  ✓ Instance $INSTANCE_ID deployed successfully"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "  ✗ Deploy failed on $INSTANCE_ID (status: $STATUS)"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi
            sleep 10
          done
        done
      - echo "=== All instances deployed successfully ==="
