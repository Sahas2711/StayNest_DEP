version: 0.0
os: linux

files:
  - source: target/StayNest-0.0.1-SNAPSHOT.jar
    destination: /opt/staynest

hooks:
  BeforeInstall:
    - location: scripts/stop_server.sh
      timeout: 60
      runas: root

  AfterInstall:
    - location: scripts/inject_env.sh
      timeout: 60
      runas: root
    - location: scripts/set_permissions.sh
      timeout: 30
      runas: root

  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 90
      runas: root

  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 60
      runas: root
