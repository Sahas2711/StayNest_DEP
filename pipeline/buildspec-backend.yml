version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - java -version
      - mvn -version

  build:
    commands:
      - echo "=== Building Spring Boot JAR ==="
      - cd backend
      - mvn clean package -DskipTests -q
      - ls -lh target/StayNest-0.0.1-SNAPSHOT.jar

artifacts:
  files:
    - target/StayNest-0.0.1-SNAPSHOT.jar
  base-directory: backend
  discard-paths: no

cache:
  paths:
    - /root/.m2/**/*
