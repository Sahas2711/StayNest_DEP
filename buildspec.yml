version: 0.2

# Combined buildspec for StayNest (frontend + backend)
# Requires both Java 17 and Node.js 20 in the build environment.
# Use a custom Docker image or run separate CodeBuild projects per service.

phases:
  install:
    runtime-versions:
      java: corretto17
      nodejs: 20
    commands:
      - echo "Installing frontend dependencies..."
      - cd frontend && npm ci && cd ..

  pre_build:
    commands:
      - echo "Pre-build checks..."
      - java -version
      - node -v
      - mvn -version

  build:
    commands:
      - echo "Building React frontend..."
      - cd frontend && npm run build && cd ..
      - echo "Building Spring Boot backend..."
      - cd backend && mvn clean package -DskipTests && cd ..

  post_build:
    commands:
      - echo "All builds completed successfully."

artifacts:
  secondary-artifacts:
    frontend:
      base-directory: frontend/build
      files:
        - "**/*"
      name: staynest-frontend-$(date +%Y%m%d%H%M%S)
    backend:
      base-directory: backend
      files:
        - target/StayNest-0.0.1-SNAPSHOT.jar
      name: staynest-backend-$(date +%Y%m%d%H%M%S)

cache:
  paths:
    - /root/.m2/**/*
    - frontend/node_modules/**/*
