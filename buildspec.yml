version: 0.2
# Root buildspec — delegates to pipeline/buildspec-backend.yml and pipeline/buildspec-frontend.yml
# This file is kept for local reference only.
# CodePipeline uses the per-service buildspecs defined in /pipeline/.

phases:
  install:
    runtime-versions:
      java: corretto17
      nodejs: 20
    commands:
      - java -version
      - node -v
      - mvn -version

  build:
    commands:
      - echo "Building backend..."
      - cd backend && mvn clean package -DskipTests -q
      - echo "Building frontend..."
      - cd frontend && npm install --legacy-peer-deps && npm run build

artifacts:
  secondary-artifacts:
    backend:
      base-directory: backend
      files:
        - target/StayNest-0.0.1-SNAPSHOT.jar
        - appspec.yml
        - scripts/**/*
    frontend:
      base-directory: frontend/build
      files:
        - "**/*"

cache:
  paths:
    - /root/.m2/**/*
    - frontend/node_modules/**/*
