version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing frontend dependencies..."
      - npm ci

  pre_build:
    commands:
      - echo "Starting frontend build..."
      - node -v
      - npm -v

  build:
    commands:
      - echo "Building React application..."
      - npm run build

  post_build:
    commands:
      - echo "Frontend build completed successfully."

artifacts:
  files:
    - "**/*"
  base-directory: build
  name: staynest-frontend-$(date +%Y%m%d%H%M%S)

cache:
  paths:
    - node_modules/**/*
